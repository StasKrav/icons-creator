<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <title>Редактор Иконок — Векторный редактор</title>
</head>

<body>
    <div class="app">
        <!-- ЛЕВАЯ ПАНЕЛЬ: инструменты -->
        <div class="toolbar">
            <button class="tool-btn active" data-tool="select" title="Выбор (V)">
                <svg width="449" height="449" viewBox="0 0 449 449">
                <path d="M32.5,32.5 L128.5,416.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M32.5,32.5 L416.5,128.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M416.5,128.5 L352.5,192.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M128.5,416.5 L192.5,352.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M192.5,352.5 L256.5,416.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M256.5,416.5 L416.5,256.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M416.5,256.5 L352.5,192.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="rectangle" title="Прямоугольник (R)">
                <svg width="481" height="321" viewBox="0 0 481 321">
                <path d="M32.5,32.5 L448.5,32.5 L448.5,288.5 L32.5,288.5 Z" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="circle" title="Круг (C)">
                <svg width="337" height="337" viewBox="0 0 336.5290039756342 336.5290039756343">
                <circle cx="168.26450198781714" cy="168.26450198781714" r="135.76450198781714" stroke="currentColor" stroke-width="13" fill="none"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="line" title="Линия (L)">
                <svg width="353" height="353" viewBox="0 0 353 353">
                <path d="M64.5,288.5 L288.5,64.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <circle cx="64.5" cy="288.5" r="32" stroke="currentColor" stroke-width="13" fill="none"/>
                <circle cx="288.5" cy="64.5" r="32" stroke="currentColor" stroke-width="13" fill="none"/>
                </svg>
                
            </button>
            <button class="tool-btn" data-tool="curve" title="Кривая Безье (B)">
                <svg width="360" height="355" viewBox="0 0 359.25483399593907 354.25483399593907">
                <circle cx="70.75483399593904" cy="289.75483399593907" r="32" stroke="currentColor" stroke-width="13" fill="none"/>
                <circle cx="294.75483399593907" cy="65.75483399593904" r="32" stroke="currentColor" stroke-width="13" fill="none"/>
                <path d="M70.75483399593904,289.75483399593907 Q97.75483399593904,90.25483399593904 294.75483399593907,65.75483399593904" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <circle cx="77.75483399593904" cy="77.75483399593904" r="45.254833995939045" stroke="currentColor" stroke-width="13" fill="none"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="erase" title="Ластик (E)">
                <svg width="353" height="353" viewBox="0 0 353 353">
                <path d="M224.5,32.5 L32.5,224.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M32.5,256.5 L96.5,320.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M128.5,320.5 L320.5,128.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M320.5,128.5 L224.5,32.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M96.5,320.5 L320.5,320.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M96.5,160.5 L192.5,256.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M32.5,224.5 L32.5,256.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                </svg>
            </button>
            <!-- РАЗДЕЛИТЕЛЬ -->
            <div style="flex: 1;"></div>

            <!-- КНОПКА НАСТРОЕК ПРИЛОЖЕНИЯ -->
            <div class="app-menu-container">
                <button class="tool-btn" id="appMenuBtn" title="Меню приложения">
                    <svg width="448" height="480" viewBox="0 0 448 480">
                    <circle cx="112" cy="112" r="32" stroke="currentColor" stroke-width="24" fill="none"/>
                    <path d="M208,112 L368,112" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                    <path d="M80,240 L240,240" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                    <circle cx="336" cy="240" r="32" stroke="currentColor" stroke-width="24" fill="none"/>
                    <circle cx="112" cy="368" r="32" stroke="currentColor" stroke-width="24" fill="none"/>
                    <path d="M208,368 L368,368" stroke="currentColor" stroke-width="24" fill="none" stroke-linecap="round"/>
                    </svg>
                </button>
                <div class="app-menu-dropdown" id="appMenuDropdown">
                    <!-- Пункты меню генерируются из JS -->
                </div>
            </div>

            <div class="toolbar-logo">
            	<svg width="800" height="800" viewBox="0 0 800 800">
            	<path d="M240,560 L240,560" stroke="#bbbbbb" stroke-width="120" fill="none" stroke-linecap="round"/>
            	<path d="M368,560 L528,560" stroke="#bbbbbb" stroke-width="96" fill="none" stroke-linecap="round"/>
            	<path d="M240,272 C240,496 560,496 560,272" stroke="#bbbbbb" stroke-width="96" fill="none" stroke-linecap="round"/>
            	<path d="M400,272 L400,272" stroke="#bbbbee" stroke-width="120" fill="none" stroke-linecap="round"/>
            	</svg>
            	</div>
        </div>

        <!-- ЦЕНТР: Канвас -->
        <div class="canvas-container">
            <canvas id="canvas" width="512" height="512"></canvas>
            <button class="grid-toggle" id="gridBtn" title="Сетка (G)">
                <svg width="449" height="449" viewBox="0 0 449 449">
                <path d="M32.5,32.5 L416.5,32.5 L416.5,416.5 L32.5,416.5 Z" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M128.5,32.5 L128.5,416.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M224.5,32.5 L224.5,416.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M320.5,32.5 L320.5,416.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M32.5,320.5 L416.5,320.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M32.5,224.5 L416.5,224.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                <path d="M32.5,128.5 L416.5,128.5" stroke="currentColor" stroke-width="13" fill="none" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ (сворачиваемая) -->
    <div class="right-panel" id="rightPanel">
        <div class="panel-toggle" id="panelToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </div>
        <div class="panel-content">
            
            <!-- ВКЛАДКИ -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    Настройки
                </button>
                <button class="tab-btn" data-tab="actions">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Действия
                </button>
            </div>
    
            <!-- ВКЛАДКА: НАСТРОЙКИ -->
            <div class="tab-content active" id="tab-settings">
                <!-- Стиль линии -->
                <div class="panel-section">
                    <h3>Стиль линии</h3>
                    <div class="property-group">
                        <div class="property-row">
                            <label>Цвет</label>
                            <div class="color-preview" id="colorPreview" style="background: #3b82f6" onclick="document.getElementById('color').click()"></div>
                            <input type="color" id="color" value="#3b82f6" style="position: absolute; opacity: 0;">
                        </div>
                        <div class="property-row">
                            <label>Толщина</label>
                            <div class="thickness-control">
                                <span class="thickness-value" id="thickVal">3</span>
                                <input type="range" id="thickness" min="0" max="20" value="3">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Заливка</h3>
                    <div class="property-group">
                        <div class="property-row">
                            <label>Тип</label>
                            <select id="fillType" style="flex: 1;">
                                <option value="none">Без заливки</option>
                                <option value="solid">Сплошная</option>
                                <option value="gradient">Градиент</option>
                            </select>
                        </div>
                        
                        <div id="solidFillControl" style="display: none;">
                            <div class="property-row">
                                <label>Цвет</label>
                                <div class="color-preview" id="fillColorPreview" style="background: #3b82f6; width: 40px; height: 40px;" onclick="document.getElementById('fillColor').click()"></div>
                                <input type="color" id="fillColor" value="#3b82f6" style="position: absolute; opacity: 0;">
                            </div>
                        </div>
                        
                        <div id="gradientFillControl" style="display: none;">
                            <div class="property-row">
                                <label>Тип градиента</label>
                                <select id="fillGradientType" style="flex: 1;">
                                    <option value="linear">Линейный</option>
                                    <option value="radial">Радиальный</option>
                                </select>
                            </div>
                            <div class="property-row">
                                <label>Цвет 1</label>
                                <div class="color-preview" id="fillGradientColor1Preview" style="background: #3b82f6; width: 40px; height: 40px; cursor: pointer;"></div>
                                <input type="color" id="fillGradientColor1" value="#3b82f6" style="position: absolute; opacity: 0;">
                            </div>
                            <div class="property-row">
                                <label>Цвет 2</label>
                                <div class="color-preview" id="fillGradientColor2Preview" style="background: #8b5cf6; width: 40px; height: 40px; cursor: pointer;"></div>
                                <input type="color" id="fillGradientColor2" value="#8b5cf6" style="position: absolute; opacity: 0;">
                            </div>
                            <div class="property-row">
                                <label>Угол</label>
                                <input type="range" id="fillGradientAngle" min="0" max="360" value="90" style="flex: 1;">
                                <span class="thickness-value" id="fillAngleVal" style="min-width: 45px;">90°</span>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Фон -->
                <div class="panel-section">
                    <h3>Фон</h3>
                    <div class="property-group">
                        <div class="property-row">
                            <label>Тип фона</label>
                            <select id="bgType" style="flex: 1;">
                                <option value="none">Прозрачный</option>
                                <option value="solid">Сплошной цвет</option>
                                <option value="gradient">Градиент</option>
                            </select>
                        </div>
                        
                        <div id="solidBgControl" style="display: none;">
                            <div class="property-row">
                                <label>Цвет</label>
                                <div class="color-preview" id="bgColorPreview" style="background: #ffffff; width: 40px; height: 40px;" onclick="document.getElementById('bgColor').click()"></div>
                                <input type="color" id="bgColor" value="#ffffff" style="position: absolute; opacity: 0;">
                            </div>
                        </div>
                        
                        <div id="gradientBgControl" style="display: none;">
                            <div class="property-row">
                                <label>Тип</label>
                                <select id="gradientType" style="flex: 1;">
                                    <option value="linear">Линейный</option>
                                    <option value="radial">Радиальный</option>
                                </select>
                            </div>
                            <div class="property-row">
                                <label>Цвет 1</label>
                                <div class="color-preview" id="gradientColor1Preview" style="background: #3b82f6; width: 40px; height: 40px; cursor: pointer;"></div>
                                <input type="color" id="gradientColor1" value="#3b82f6" style="position: absolute; opacity: 0;">
                            </div>
                            <div class="property-row">
                                <label>Цвет 2</label>
                                <div class="color-preview" id="gradientColor2Preview" style="background: #8b5cf6; width: 40px; height: 40px; cursor: pointer;"></div>
                                <input type="color" id="gradientColor2" value="#8b5cf6" style="position: absolute; opacity: 0;">
                            </div>
                            <div class="property-row">
                                <label>Угол</label>
                                <input type="range" id="gradientAngle" min="0" max="360" value="90" style="flex: 1;">
                                <span class="thickness-value" id="angleVal" style="min-width: 45px;">90°</span>
                            </div>
                        </div>
                    </div>
                </div>
    
                <!-- Сетка -->
                <div class="panel-section">
                    <h3>Сетка</h3>
                    <div class="property-group">
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="snap" checked> Привязка к сетке</label>
                        </div>

                        <!-- В panel-section с сеткой -->
                        <div class="property-row">
                            <label>Режим сетки</label>
                            <select id="gridMode">
                                <option value="square">Квадратная</option>
                                <option value="triangular">Треугольная</option>
                                <option value="isometric">Изометрическая</option>
                            </select>
                        </div>
                        
                        <!-- Размер для треугольной и изометрической сетки -->
                        <div class="property-row" id="triSizeRow" style="display: none;">
                            <label>Размер ячейки</label>
                            <div class="thickness-control">
                                <span class="thickness-value" id="triSizeVal">32</span>
                                <input type="range" id="triGridSize" min="16" max="64" value="32" step="4">
                            </div>
                        </div>
                        
                        <div class="property-row" id="squareSizeRow">
                            <label>Шаг сетки</label>
                            <select id="gridSize">
                                <option value="8">8 px</option>
                                <option value="16">16 px</option>
                                <option value="24">24 px</option>
                                <option value="32" selected>32 px</option>
                            </select>
                        </div>
                    
                    </div>
                </div>
    
                <!-- Режим иконки -->
                <div class="panel-section">
                    <h3>Режим иконки</h3>
                    <div class="property-group">
                        <select id="iconMode">
                            <option value="favicon">Favicon (16×16px)</option>
                            <option value="menu32">Меню (32×32px)</option>
                            <option value="standard64" selected>Стандартная (64×64px)</option>
                            <option value="high128">Высокое разрешение (128×128px)</option>
                            <option value="ultra256">Ультра HD (256×256px)</option>
                            <option value="full512">Полное (512×512px)</option>
                        </select>
                    </div>
                </div>
            </div>
    
            <!-- ВКЛАДКА: ДЕЙСТВИЯ -->
            <div class="tab-content" id="tab-actions">
                <div class="panel-section">
                    <h3>Правка</h3>
                    <div class="action-buttons">
                        <button class="action-btn" id="undoBtn">
                            Отменить
                        </button>
                        <button class="action-btn danger" id="clearBtn">
                            Очистить всё
                        </button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>Импорт</h3>
                    <div class="action-buttons">
                        <button class="action-btn" id="importSVGBtn">
                            Импорт SVG
                        </button>
                        <input type="file" id="svgFileInput" accept=".svg" style="display: none;">
                    </div>
                </div>
    
                <div class="panel-section">
                    <h3>Экспорт</h3>
                    <div class="action-buttons">
                        <button class="action-btn" id="exportSVGBtn">
                            Экспорт SVG
                        </button>
                        <button class="action-btn primary" id="exportPNGBtn">
                            Экспорт PNG
                        </button>
                    </div>
                </div>
    
                <div class="panel-section">
                    <h3>Веб-экспорт</h3>
                    <div class="action-buttons">
                        <button class="action-btn" id="exportAllSizesBtn">
                            Экспорт всех размеров
                        </button>
                        <button class="action-btn" id="exportFaviconBtn">
                            Favicon комплект
                        </button>
                        <button class="action-btn" id="exportSpriteBtn">
                            SVG Sprite + CSS
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/tools.js"></script>
<script src="js/export.js"></script>
<script src="js/import.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
